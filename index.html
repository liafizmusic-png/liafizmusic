<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>LiafizMusic</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.85)),
url("background.png");

background-size:cover;
background-position:center;
background-attachment:fixed;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

color:white;

}

.card{

width:90%;
max-width:420px;

background:rgba(0,0,0,.45);

backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,.08);

border-radius:28px;

padding:40px 28px;

text-align:center;

box-shadow:0 0 40px rgba(0,153,255,.30);

animation:fade 1s;

}

.logo{

width:140px;

margin-bottom:20px;

filter:drop-shadow(0 0 18px #00bfff);

}

h1{

font-size:34px;

letter-spacing:2px;

margin-bottom:8px;

}

p{

color:#cfcfcf;

font-size:15px;

margin-bottom:35px;

}

.btn{

display:block;

padding:18px;

margin:16px 0;

text-decoration:none;

font-size:18px;

font-weight:600;

border-radius:18px;

transition:.35s;

color:white;

background:linear-gradient(90deg,#0077ff,#00bfff);

box-shadow:0 0 20px rgba(0,162,255,.45);

}

.btn:hover{

transform:translateY(-3px);

box-shadow:0 0 35px #00bfff;

}

.footer{

margin-top:30px;

font-size:13px;

color:#9e9e9e;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>

</head>

<body>

<div class="card">

<img src="logo.png" class="logo">

<h1>LiafizMusic</h1>

<p>
🎵 Original Music<br>
🎬 Cinematic Visuals<br>
✨ AI Creative Studio
</p>

<a class="btn" href="https://youtube.com/@liafizmusic?si=Pr07JgzY0FIBXFZX">
▶ YouTube
</a>

<a class="btn" href="https://www.tiktok.com/@liafizmusic?_r=1&_t=ZS-97jqfFpqll7">
🎵 TikTok
</a>

<div class="footer">

Every Beat Tells A Story

</div>

</div>

</body>
</html>
</head>

<body>

<h1>LiafizMusic</h1>
<p>Original Music & Cinematic Video</p>

<a href="https://www.tiktok.com/@liafizmusic?_r=1&_t=ZS-97jqfFpqll7">TikTok</a>

</body>
</html>
